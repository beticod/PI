# ===============================
# = CONFIGURACIÓN DEL SERVIDOR
# ===============================
server.port=8080
# server.address=0.0.0.0 Si deseas que la aplicación sea accesible desde cualquier dirección IP, para que pueda funcionar en el móvil
# ===============================
# = CONFIGURACIÓN DE LA BBDD
# ===============================
spring.datasource.url=jdbc:mariadb://localhost:3306/biblioteca
spring.datasource.username=usuario
spring.datasource.password=usuario123
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true


# ===============================
# = JPA / HIBERNATE
# ===============================
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MariaDBDialect

# ===============================
# = MENSAJES DE VALIDACIÓN
# ===============================
spring.messages.basename=messages
spring.messages.encoding=UTF-8
